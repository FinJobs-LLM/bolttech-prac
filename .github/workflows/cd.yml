name: CD

# Build and push a Docker image whenever a git tag is pushed.
# The image is tagged with the git tag version (e.g. v1.2.3) and `latest`.
on:
  push:
    tags:
      - "*"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ACCOUNT }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Stamp the git tag into the image so the running service can report it
          # (config.APP_VERSION); pair it with the version-controlled llm_config.yaml.
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: |
            ${{ secrets.DOCKER_ACCOUNT }}/bolttech-prac:${{ github.ref_name }}
            ${{ secrets.DOCKER_ACCOUNT }}/bolttech-prac:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
