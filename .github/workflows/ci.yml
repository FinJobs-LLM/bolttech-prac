name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the test image (Docker `test` stage)
        # The `test` stage is built from the same Dockerfile as the production
        # image: it reuses the locked-dependency venv and adds pytest + tests.
        run: docker build --target test -t bolttech-prac:test .

      - name: Run pytest inside the image
        run: docker run --rm bolttech-prac:test
