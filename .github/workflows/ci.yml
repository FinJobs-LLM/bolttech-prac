name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the application Docker image
        run: docker build -t bolttech-prac:ci .

      - name: Run pytest inside the image
        # Run pytest in the built image so tests use the exact deployed environment
        # (the image's /app/.venv). The production image doesn't bake in tests/, so
        # the repo is mounted; pytest is added on the fly. --user root avoids
        # mount-permission issues; no:cacheprovider avoids writing .pytest_cache.
        run: >
          docker run --rm --user root
          -v "${{ github.workspace }}":/workspace -w /workspace
          bolttech-prac:ci
          sh -c "pip install --quiet pytest && python -m pytest -q -p no:cacheprovider"
